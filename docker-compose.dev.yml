version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce_dashboard
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce_dev_net

  redis:
    image: redis:7-alpine
    container_name: ecommerce_redis_dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce_dev_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: ecommerce_backend_dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ecommerce_dashboard
      REDIS_URL: redis://redis:6379
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    ports:
      - "3001:3001"
    networks:
      - ecommerce_dev_net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ecommerce_frontend_dev
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    environment:
      VITE_BACKEND_URL: http://backend:3001
    ports:
      - "8080:8080"
    networks:
      - ecommerce_dev_net

volumes:
  postgres_dev_data:
  redis_dev_data:

networks:
  ecommerce_dev_net:
    driver: bridge
